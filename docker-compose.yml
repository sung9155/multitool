services:
  multitool:
    build: .
    image: multitool:latest
    # 로컬 빌드 이미지 — 레지스트리 pull 금지, 항상 Dockerfile 로 빌드.
    # (Portainer "Pull and redeploy" 가 Docker Hub 에서 받으려다 실패하는 것 방지)
    pull_policy: build
    container_name: multitool
    restart: unless-stopped
    ports:
      # 호스트(미니PC) 8080 → 컨테이너 80
      # Nginx Proxy Manager 에서 이 포트로 프록시 연결
      - "8080:80"
    # NPM 과 같은 도커 네트워크에 두면 ports 노출 없이
    # 컨테이너 이름(multitool:80)으로 바로 프록시 가능.
    # networks:
    #   - proxy

# networks:
#   proxy:
#     external: true
