server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript
        application/json image/svg+xml font/woff2;

    # 해시 박힌 정적 자산 → 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 폴백: 모든 경로 → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
